<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório de DOM</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #f0ede8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            border: 0.5px solid rgba(0,0,0,0.1);
            width: 420px;
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 0.4rem;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 26px;
            font-weight: 400;
            color: #1a1a1a;
            margin-bottom: 0.75rem;
        }

        .texto-aula {
            font-size: 14px;
            color: #666;
            line-height: 1.65;
            margin-bottom: 1.5rem;
        }

        button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 1.5rem;
            transition: opacity 0.15s, transform 0.15s;
        }

        button:hover {
            opacity: 0.82;
            transform: translateY(-1px);
        }

        button:active {
            transform: scale(0.97);
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        ul li {
            background: #f7f6f3;
            border: 0.5px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.25s ease both;
        }

        ul li i {
            color: #aaa;
            font-size: 16px;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .contador {
            font-size: 12px;
            color: #aaa;
            margin-top: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="eyebrow">Laboratório de DOM</p>
        <h1 id="titulo-aula">Minha primeira página</h1>
        <p class="texto-aula">Este é um exemplo de manipulação de DOM usando JavaScript.</p>

        <button id="meu-Botao">
            <i class="ti ti-plus"></i>
            Adicionar item
        </button>

        <ul id="minhaLista">
            <li><i class="ti ti-circle-dot"></i>Item 1</li>
        </ul>

        <p class="contador" id="contador">1 item na lista</p>
    </div>

    <script>
        const btn = document.getElementById('meu-Botao');
        const lista = document.getElementById('minhaLista');
        const contador = document.getElementById('contador');
        let count = 1;

        btn.addEventListener('click', () => {
            count++;
            const li = document.createElement('li');
            li.innerHTML = `<i class="ti ti-circle-dot"></i>Item ${count}`;
            lista.appendChild(li);
            contador.textContent = `${count} ${count === 1 ? 'item' : 'itens'} na lista`;
        });
    </script>
</body>
</html>
