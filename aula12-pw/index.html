<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>laboratorio de dom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 400px;
        }
        h1 {color: #2c3e50}
        .texto-aula {color: #7f8c8d; line-height: 1.5;}
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button:hover {
            background: #2980b9;
        }
        ul {
            background: #ecf0f1;
            padding: 20px 40px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="titulo-aula">minha primeira pagina</h1>

        <p class="texto-aula">Este é um exemplo de manipulação de DOM usando JavaScript.</p>

        <button id="meu-Botao">Clique aqui</button>
        <ul id="minhaLista">
            <li>Item 1</li>
        </ul>
    </div>
</body>
</html>
