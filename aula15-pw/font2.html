<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil de Desenvolvedor</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #5fffb0;
      --accent2: #5b8fff;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
      flex-wrap: wrap;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .painel {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 340px;
      animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    .painel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .painel-header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }
    .dot-r { background: #ff5f57; }
    .dot-y { background: #ffbd2e; }
    .dot-g { background: var(--accent); }

    .painel h2 {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: auto;
    }

    .campo { margin-bottom: 18px; }

    .campo label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: var(--mono);
    }

    .campo input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .campo input::placeholder { color: var(--muted); }

    .campo input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(95,255,176,0.1);
    }

    button {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 4px;
    }

    button:hover {
      background: #78ffc0;
      box-shadow: 0 0 20px rgba(95,255,176,0.3);
    }

    button:active { transform: scale(0.98); }

    .cartao {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 340px;
      overflow: hidden;
      animation: slideUp 0.5s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }

    .cartao-topo {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 28px 24px 24px;
      position: relative;
      overflow: hidden;
    }

    .cartao-topo::after {
      content: '</>';
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 40px;
      font-weight: 700;
      color: rgba(95,255,176,0.12);
      pointer-events: none;
    }

    .avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: #000;
      margin-bottom: 14px;
      transition: transform 0.3s;
    }

    .cartao:hover .avatar { transform: scale(1.08) rotate(3deg); }

    .cartao-nome-display {
      font-family: var(--sans);
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      transition: all 0.3s;
    }

    .cartao-subtitulo {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .cartao-corpo { padding: 20px 24px; }

    .info-linha {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .info-linha:last-child { border-bottom: none; }

    .info-icone {
      width: 30px; height: 30px;
      border-radius: 6px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .info-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 2px;
    }

    .info-valor {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      transition: all 0.3s;
    }

    .info-valor.vazio { color: var(--muted); font-weight: 400; }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 4px 10px;
      background: rgba(91,143,255,0.15);
      border: 1px solid rgba(91,143,255,0.3);
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .pop { animation: pop 0.3s ease; }
  </style>
</head>
<body>

  <div class="painel">
    <div class="painel-header">
      <span class="dot dot-r"></span>
      <span class="dot dot-y"></span>
      <span class="dot dot-g"></span>
      <h2>// cadastro</h2>
    </div>

    <div class="campo">
      <label>Nome do dev</label>
      <input type="text" id="input-nome" placeholder="ex: pedro henrique…">
    </div>

    <div class="campo">
      <label>Linguagem favorita</label>
      <input type="text" id="input-linguagem" placeholder="ex: php, javascript, c#…">
    </div>

    <button id="btn-registrar">▶ criar perfil</button>
  </div>

  <div class="cartao">
    <div class="cartao-topo">
      <div class="avatar" id="avatar">?</div>
      <div class="cartao-nome-display" id="cartao-nome">Aguardando cadastro…</div>
      <div class="cartao-subtitulo">@developer</div>
    </div>
    <div class="cartao-corpo">
      <div class="info-linha">
        <div class="info-icone">💻</div>
        <div>
          <span class="info-label">linguagem favorita</span>
          <span class="info-valor vazio" id="cartao-linguagem">???</span>
        </div>
      </div>
      <div class="info-linha">
        <div class="info-icone">🟢</div>
        <div>
          <span class="info-label">status</span>
          <span class="info-valor" style="color:#5fffb0">disponível para projetos</span>
        </div>
      </div>
      <div class="info-linha">
        <div class="info-icone">🏷️</div>
        <div>
          <span class="info-label">cargo</span>
          <span class="badge">Full Stack Dev</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const botao          = document.getElementById("btn-registrar");
    const campoNome      = document.getElementById("input-nome");
    const campoLinguagem = document.getElementById("input-linguagem");
    const spanNome       = document.getElementById("cartao-nome");
    const spanLinguagem  = document.getElementById("cartao-linguagem");
    const avatar         = document.getElementById("avatar");

    botao.addEventListener("click", function () {
      const nomeDigitado      = campoNome.value.trim();
      const linguagemDigitada = campoLinguagem.value.trim();

      if (!nomeDigitado && !linguagemDigitada) return;

      if (nomeDigitado) {
        spanNome.innerText = nomeDigitado;
        avatar.innerText   = nomeDigitado.charAt(0).toUpperCase();
      }

      if (linguagemDigitada) {
        spanLinguagem.innerText = linguagemDigitada;
        spanLinguagem.classList.remove("vazio");
      }

      [spanNome, spanLinguagem, avatar].forEach(el => {
        el.classList.remove("pop");
        void el.offsetWidth;
        el.classList.add("pop");
      });

      campoNome.value      = "";
      campoLinguagem.value = "";
    });

    [campoNome, campoLinguagem].forEach(input => {
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") botao.click();
      });
    });
  </script>
</body>
</html>
